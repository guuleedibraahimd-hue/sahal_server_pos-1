<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Information</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#eef2f7;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#1d4350,#2c5364);
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    position:sticky;
    top:0;
    z-index:999;
}

/* FEED */
.feed{
    max-width:650px;
    margin:20px auto;
    padding:12px;
}

/* CARD */
.card{
    background:white;
    border-radius:18px;
    padding:18px;
    margin-bottom:18px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
    border-left:6px solid #2c5364;
    cursor:grab;
}

.dragging{
    opacity:0.5;
}

/* TOP */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

.badge{
    background:#2c5364;
    color:white;
    padding:5px 12px;
    border-radius:30px;
    font-size:12px;
    font-weight:bold;
}

.drag-icon{
    color:#777;
    font-size:20px;
}

/* TITLE */
.title{
    font-size:19px;
    font-weight:bold;
    margin-bottom:10px;
}

/* CONTENT */
.content{
    font-size:15px;
    color:#444;
    line-height:1.8;
    white-space:pre-wrap;
}

/* MEDIA */
img, video{
    width:100%;
    border-radius:14px;
    margin-top:15px;
}

/* FOOTER */
.footer{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

/* BUTTONS */
.btns{
    display:flex;
    gap:10px;
}

.deleteBtn{
    background:#ff3b3b;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.editBtn{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.saveBtn{
    background:#28a745;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    margin-bottom:20px;
}

.date{
    color:#777;
    font-size:13px;
}

.empty{
    text-align:center;
    background:white;
    padding:30px;
    border-radius:15px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
📢 Sahal Server System Information
</div>

<div class="feed">

<button class="saveBtn" onclick="savePositions()">
💾 Save New Positions
</button>

<div id="infoList"></div>

</div>

<script>

let infoData = [];

fetch("/get_all_info")
.then(res => res.json())
.then(data => {

    let box = document.getElementById("infoList");

    if(data.length === 0){

        box.innerHTML = `
        <div class="empty">
            No Information Added Yet 🚫
        </div>
        `;

        return;
    }

    infoData = data;

    renderCards();

});

/* RENDER */
function renderCards(){

    let box = document.getElementById("infoList");

    box.innerHTML = "";

    infoData.forEach((i,index)=>{

        box.innerHTML += `

        <div class="card"
        draggable="true"
        data-id="${i.id}">

            <div class="top">

                <div class="badge">
                    SYSTEM INFO
                </div>

                <i class="fas fa-grip-vertical drag-icon"></i>

            </div>

            <div class="title">
                🏫 ${i.title || ""}
            </div>

            <div class="content">
                ${i.content || ""}
            </div>

            ${i.image ? `
            <img src="/static/info/${i.image}">
            ` : ""}

            ${i.video ? `
            <video controls>
                <source src="/static/info/${i.video}">
            </video>
            ` : ""}

            <div class="footer">

                <div class="date">
                    📅 ${i.date || "Today"}
                </div>

                <div class="btns">

                    <button class="editBtn"
                    onclick="editInfo('${i.id}')">
                        Edit
                    </button>

                    <button class="deleteBtn"
                    onclick="deleteInfo('${i.id}')">
                        Delete
                    </button>

                </div>

            </div>

        </div>

        `;
    });

    enableDrag();

}

/* DELETE */
function deleteInfo(id){

    if(!confirm("Delete this information?")){
        return;
    }

    fetch("/delete_info/" + id,{
        method:"DELETE"
    })
    .then(res=>res.json())
    .then(data=>{
        location.reload();
    });

}

/* EDIT */
function editInfo(id){

    window.location.href = "/edit_info/" + id;

}

/* DRAG */
function enableDrag(){

    const cards = document.querySelectorAll(".card");
    const container = document.getElementById("infoList");

    cards.forEach(card=>{

        card.addEventListener("dragstart", ()=>{

            card.classList.add("dragging");

        });

        card.addEventListener("dragend", ()=>{

            card.classList.remove("dragging");

        });

    });

    container.addEventListener("dragover", e=>{

        e.preventDefault();

        const afterElement = getDragAfterElement(container,e.clientY);

        const dragging = document.querySelector(".dragging");

        if(afterElement == null){

            container.appendChild(dragging);

        }else{

            container.insertBefore(dragging,afterElement);

        }

    });

}

/* POSITION */
function getDragAfterElement(container,y){

    const draggableElements = [...container.querySelectorAll(".card:not(.dragging)")];

    return draggableElements.reduce((closest,child)=>{

        const box = child.getBoundingClientRect();

        const offset = y - box.top - box.height / 2;

        if(offset < 0 && offset > closest.offset){

            return {
                offset:offset,
                element:child
            };

        }else{

            return closest;

        }

    }, {
        offset:Number.NEGATIVE_INFINITY
    }).element;

}

/* SAVE POSITIONS */
function savePositions(){

    let positions = [];

    document.querySelectorAll(".card").forEach((card,index)=>{

        positions.push({
            id: card.dataset.id,
            position: index
        });

    });

    fetch("/update_info_positions",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            positions:positions
        })

    })

    .then(res=>res.json())

    .then(data=>{

        alert("Positions updated successfully ✅");

    });

}

</script>

</body>
</html>
