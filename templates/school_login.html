<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Login | Sahal Server</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(to right, #373B44, #4286f4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .box {
        background: white;
        padding: 40px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        text-align: center;
    }
    h2 { color: #333; margin-bottom: 25px; font-size: 24px; }
    input {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 16px;
    }
    button {
        width: 100%;
        padding: 12px;
        margin-top: 25px;
        background: #4286f4;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }
    button:hover { background: #373B44; }
    .error {
        margin-top: 15px;
        color: red;
        font-size: 14px;
        min-height: 20px;
    }
</style>
</head>
<body>

<div class="box">
    <h2>🔐 School Login</h2>

    <!-- ✅ Normal form POST - no JavaScript needed -->
    <form method="POST" action="/school_login">

        <!-- ✅ name="username" - Python u baahan yahay -->
        <input 
            type="text" 
            name="username" 
            placeholder="School Code (e.g. 7891)"
            required
        >
        <input 
            type="password" 
            name="password" 
            placeholder="Password"
            required
        >
        <button type="submit">Login</button>
    </form>

    <!-- ✅ Error - Python ka yimaada -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

</div>

</body>
</html>
