<!DOCTYPE html>
<html>
<head>
    <title>QR Code</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
    body{
        font-family:Arial, sans-serif;
        text-align:center;
        background:#f0f2f8;
        padding:40px 20px;
        margin:0;
    }

    /* ── QR Card ── */
    .card{
        background:white;
        border-radius:20px;
        display:inline-block;
        box-shadow:0 8px 32px rgba(0,0,0,0.13);
        max-width:420px;
        width:100%;
        overflow:hidden;
        padding-bottom:28px;
    }

    /* ── Header gradient ── */
    .card-header{
        background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        padding: 38px 20px 60px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* food-dome icon circle */
    .logo-circle{
        width: 80px;
        height: 80px;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }

    .logo-circle svg{
        width: 44px;
        height: 44px;
        fill: #2563eb;
    }

    /* ── Body ── */
    .card-body{
        padding: 0 28px;
    }

    .restaurant-name{
        font-size: 22px;
        font-weight: 800;
        color: #1e3a8a;
        margin: 24px 0 4px;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    .restaurant-tagline{
        font-size: 13px;
        color: #64748b;
        font-style: italic;
        margin: 0 0 20px;
    }

    /* dashed separator */
    .separator{
        border: none;
        border-top: 2px dashed #cbd5e1;
        margin: 18px 0;
    }

    /* table badge */
    .table-badge-wrapper{
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 18px;
    }

    .leaf-svg{
        width: 28px;
        opacity: 0.45;
    }

    .table-badge{
        background: #eff6ff;
        border: 1.5px solid #bfdbfe;
        border-radius: 14px;
        padding: 10px 28px;
        text-align: center;
    }

    .table-label{
        font-size: 11px;
        font-weight: 700;
        color: #2563eb;
        letter-spacing: 2px;
        text-transform: uppercase;
        display: block;
    }

    .table-number{
        font-size: 40px;
        font-weight: 900;
        color: #2563eb;
        line-height: 1;
        display: block;
    }

    /* QR image box */
    .qr-box{
        border: 2px solid #93c5fd;
        border-radius: 16px;
        padding: 14px;
        display: inline-block;
        background: white;
        box-shadow: 0 2px 12px rgba(37,99,235,0.09);
    }

    #qrimg{
        width: 220px;
        height: 220px;
        max-width: 100%;
        object-fit: contain;
        image-rendering: pixelated;
        display: block;
    }

    /* scan hint */
    .scan-hint{
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin: 16px 0 20px;
        color: #475569;
        font-size: 13px;
    }

    .scan-hint-icon{
        width: 34px;
        height: 34px;
        background: #eff6ff;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .scan-hint-icon svg{
        width: 18px;
        height: 18px;
        fill: #2563eb;
    }

    .scan-hint-text{
        text-align: left;
    }

    .scan-hint-text strong{
        display: block;
        color: #1e293b;
        font-size: 14px;
    }

    /* Buttons */
    .btn-row{
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 6px;
    }

    .btn{
        padding: 11px 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        color: white;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex: 1;
        min-width: 110px;
        justify-content: center;
        transition: opacity .18s;
    }

    .btn:hover{ opacity: .88; }

    .download{ background: #22c55e; }
    .print   { background: #f59e0b; }
    .close   { background: #ec4899; }

    /* close button below card */
    .close-btn{
        margin-top: 22px;
        display: inline-block;
        color: #64748b;
        font-size: 14px;
        cursor: pointer;
        background: none;
        border: none;
    }

    </style>
</head>

<body>

<div class="card">

    <!-- Header -->
    <div class="card-header">
        <div class="logo-circle">
            <!-- Food dome SVG -->
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 36 Q10 18 32 18 Q54 18 54 36 Z"/>
                <rect x="8" y="36" width="48" height="4" rx="2"/>
                <rect x="28" y="40" width="8" height="6" rx="1"/>
                <rect x="20" y="46" width="24" height="3" rx="1.5"/>
                <!-- stars -->
                <text x="24" y="58" font-size="8" fill="#2563eb">★ ★ ★</text>
            </svg>
        </div>
    </div>

    <!-- Body -->
    <div class="card-body">

        <div class="restaurant-name">{{ restaurant }}</div>
        <div class="restaurant-tagline">— Delicious food, great experience —</div>

        <hr class="separator">

        <!-- Table badge -->
        <div class="table-badge-wrapper">
            <!-- leaf left -->
            <svg class="leaf-svg" viewBox="0 0 40 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 55 C20 55 5 40 8 22 C11 8 20 5 20 5 C20 5 29 8 32 22 C35 40 20 55 20 55Z" fill="#93c5fd"/>
                <line x1="20" y1="55" x2="20" y2="5" stroke="#60a5fa" stroke-width="1.5"/>
            </svg>

            <div class="table-badge">
                <span class="table-label">Table</span>
                <span class="table-number">{{ table }}</span>
            </div>

            <!-- leaf right (mirrored) -->
            <svg class="leaf-svg" viewBox="0 0 40 60" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform:scaleX(-1)">
                <path d="M20 55 C20 55 5 40 8 22 C11 8 20 5 20 5 C20 5 29 8 32 22 C35 40 20 55 20 55Z" fill="#93c5fd"/>
                <line x1="20" y1="55" x2="20" y2="5" stroke="#60a5fa" stroke-width="1.5"/>
            </svg>
        </div>

        <hr class="separator">

        <!-- QR Image -->
        <div class="qr-box">
            <img id="qrimg"
                 src="/static/qr/{{ img }}"
                 alt="QR Code">
        </div>

        <!-- Scan hint -->
        <div class="scan-hint">
            <div class="scan-hint-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17 1H7C5.9 1 5 1.9 5 3v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zm-5 20c-.83 0-1.5-.67-1.5-1.5S11.17 18 12 18s1.5.67 1.5 1.5S12.83 21 12 21zm5-4H7V4h10v13z"/>
                </svg>
            </div>
            <div class="scan-hint-text">
                <strong>Scan to view our menu</strong>
                Thank you for dining with us! ♥
            </div>
        </div>

        <!-- Buttons -->
        <div class="btn-row">
            <a href="/static/qr/{{ img }}" download class="btn download">
                ⬇ Download QR
            </a>
            <button class="btn print" onclick="printQR()">
                🖨 Print QR
            </button>
            <button class="btn close" onclick="goBack()">
                ✕ Share QR
            </button>
        </div>

    </div>
</div>

<br>
<button class="close-btn" onclick="goBack()">Close</button>

<script>
function printQR(){
    const img = document.getElementById("qrimg").src;
    const w = window.open("", "_blank");
    w.document.write(`
        <html>
        <body style="text-align:center;padding:40px;">
            <img src="${img}" style="width:300px;height:300px;">
            <script>
                window.onload=function(){
                    window.print();
                    window.close();
                }
            <\/script>
        </body>
        </html>
    `);
    w.document.close();
}

function goBack(){
    window.location.href="/dashboard/{{ rid }}";
}
</script>

</body>
</html>
