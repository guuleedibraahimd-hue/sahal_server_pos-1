<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>School Login | Sahal Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #1565C0);
            display: flex; align-items: center; justify-content: center;
            font-family: Arial, sans-serif;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 { margin-bottom: 30px; font-size: 24px; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #1565C0; }
        button {
            width: 100%;
            padding: 14px;
            background: #1565C0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #0d47a1; }
        .error { color: red; margin-top: 14px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 School Login</h1>

        <form method="POST" action="/school_login">
            <!-- ✅ School Code field -->
            <input 
                type="text" 
                name="username" 
                placeholder="School Code (e.g. 7891)"
                value="{{ request.form.get('username', '') }}"
                required
            >
            <!-- ✅ Password field -->
            <input 
                type="password" 
                name="password" 
                placeholder="Password"
                required
            >
            <button type="submit">Login</button>
        </form>

        <!-- ✅ Error message -->
        {% if error %}
            <p class="error">❌ {{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
